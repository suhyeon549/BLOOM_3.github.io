<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Liquid Blob Cursor</title>
  <!-- 
    Liquid Blob Cursor Component
    
    Core Idea: 
    Uses multiple SVG paths to render a soft, organic morphing blob and its satellites.
    Calculates vertex positions using sine waves to simulate fluid movement, 
    connecting them with cubic Bezier curves. A requestAnimationFrame loop smoothly 
    interpolates the cursor position (LERP) with different delays for the main blob 
    and its smaller satellite blobs.
  -->
  <style>
    /* Tunable Parameters */
    :root {
      --blob-size: 80px;
      /* Size of the main blob */
      --blob-color: #ffffff;
      /* Color changed to white */
      --blob-duration: 8;
      /* Morph cycle duration in seconds (range: 3 - 18) */
      --blob-opacity: 0.9;
      /* Base opacity */
      --blob-radius: 28;
      /* Base radius of the SVG path (max ~45) */
      --blob-variation: 10;
      /* Morphing variation amplitude (how squiggly it gets) */
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #1e1e1e;
      /* Changed to dark background so white blob is visible */
      cursor: crosshair;
      font-family: sans-serif;
    }

    /* Blob Containers */
    .blob-container {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s ease;
      will-change: transform;
      /* Add a subtle glow for better liquid effect */
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
    }

    #blob-main-container {
      width: var(--blob-size);
      height: var(--blob-size);
    }

    #blob-sat1-container {
      width: calc(var(--blob-size) * 0.4);
      height: calc(var(--blob-size) * 0.4);
    }

    #blob-sat2-container {
      width: calc(var(--blob-size) * 0.25);
      height: calc(var(--blob-size) * 0.25);
    }

    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    @media (prefers-reduced-motion: reduce) {
      .blob-container {
        display: none !important;
      }
    }

    .demo-text {
      padding: 50px;
      font-size: 1.5rem;
      color: #ffffff;
    }
  </style>
</head>

<body>

  <div class="demo-text">
    Move your mouse around to see the liquid blob and its satellites!<br><br>
    The size, color, and morphing speed are fully adjustable via CSS variables.
  </div>

  <!-- Component Markup -->
  <div id="liquid-blob-wrapper" aria-hidden="true">
    <div class="blob-container" id="blob-main-container">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path id="blob-main" fill="var(--blob-color)"></path>
      </svg>
    </div>
    <div class="blob-container" id="blob-sat1-container">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path id="blob-sat1" fill="var(--blob-color)"></path>
      </svg>
    </div>
    <div class="blob-container" id="blob-sat2-container">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path id="blob-sat2" fill="var(--blob-color)"></path>
      </svg>
    </div>
  </div>

  <!-- Component Script -->
  <script>
    (function initLiquidBlob() {
      // Mouse tracking state
      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;
      let isMouseMoved = false;
      let isVisible = true;

      // Define our 3 blobs (Main + 2 Satellites)
      // lerp controls the follow speed (higher = faster)
      // phase controls the animation offset so they don't look identical
      const blobs = [
        { id: 'blob-main', contId: 'blob-main-container', x: mouseX, y: mouseY, lerp: 0.4, phase: 0.0 },
        { id: 'blob-sat1', contId: 'blob-sat1-container', x: mouseX, y: mouseY, lerp: 0.2, phase: 1.5 },
        { id: 'blob-sat2', contId: 'blob-sat2-container', x: mouseX, y: mouseY, lerp: 0.1, phase: 3.0 }
      ];

      // Cache DOM elements
      blobs.forEach(b => {
        b.el = document.getElementById(b.contId);
        b.path = document.getElementById(b.id);
      });

      // Update target position
      window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;

        if (!isMouseMoved) {
          isMouseMoved = true;
          blobs.forEach(b => {
            if (b.el) b.el.style.opacity = 'var(--blob-opacity, 0.9)';
          });
        }
      });

      // Pause when off-screen
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          isVisible = entry.isIntersecting;
        });
      });
      observer.observe(document.body);

      document.addEventListener('visibilitychange', () => {
        isVisible = document.visibilityState === 'visible';
      });

      let startTime = performance.now();

      function render(time) {
        if (isVisible) {
          const rootStyles = getComputedStyle(document.documentElement);
          let duration = parseFloat(rootStyles.getPropertyValue('--blob-duration')) || 8;
          duration = Math.max(3, Math.min(duration, 18));
          const speed = (Math.PI * 2) / (duration * 1000);

          blobs.forEach((b, index) => {
            if (!b.el || !b.path) return;

            // 1. Smooth cursor follow (LERP)
            b.x += (mouseX - b.x) * b.lerp;
            b.y += (mouseY - b.y) * b.lerp;

            // Add a tiny bit of orbiting to satellites based on mouse movement speed
            let drawX = b.x;
            let drawY = b.y;

            b.el.style.transform = `translate(${drawX}px, ${drawY}px) translate(-50%, -50%)`;

            // 2. Morphing Logic
            // t is offset by the phase so satellites morph differently
            const t = (time - startTime) * speed + b.phase;

            const numPoints = 6;
            const center = 50;
            // Fetch shape parameters from CSS variables
            const baseRadius = parseFloat(rootStyles.getPropertyValue('--blob-radius')) || 28;
            const variation = parseFloat(rootStyles.getPropertyValue('--blob-variation')) || 18;

            const points = [];
            for (let i = 0; i < numPoints; i++) {
              const angle = (i / numPoints) * Math.PI * 2;
              const offset = Math.sin(t + i * 1.5) * Math.cos(t * 0.8 + i * 2.1);
              const radius = baseRadius + variation * offset;

              points.push({
                x: center + Math.cos(angle) * radius,
                y: center + Math.sin(angle) * radius,
                angle: angle
              });
            }

            // 3. Generate SVG Path
            let d = `M ${points[0].x} ${points[0].y} `;
            for (let i = 0; i < numPoints; i++) {
              const p1 = points[i];
              const p2 = points[(i + 1) % numPoints];

              const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
              const cpLen = dist * 0.33;

              const tang1 = p1.angle + Math.PI / 2;
              const tang2 = p2.angle + Math.PI / 2;

              const cp1x = p1.x + Math.cos(tang1) * cpLen;
              const cp1y = p1.y + Math.sin(tang1) * cpLen;

              const cp2x = p2.x - Math.cos(tang2) * cpLen;
              const cp2y = p2.y - Math.sin(tang2) * cpLen;

              d += `C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y} `;
            }
            b.path.setAttribute('d', d);
          });
        }
        requestAnimationFrame(render);
      }

      requestAnimationFrame(render);
    })();
  </script>
</body>

</html>
